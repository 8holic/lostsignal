<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Range Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section id="accessScreen" class="panel mission-panel">
      <div class="panel-title">MISSION ACCESS</div>

      <div class="row">
        <label for="missionCode">ENTER CODE</label>
        <input
          id="missionCode"
          type="text"
          autocomplete="off"
          spellcheck="false"
          placeholder="MISSION CODE"
        />
      </div>

      <div class="button-row">
        <button id="loadMissionBtn">LOAD MISSION</button>
        <button
          id="resumeMissionBtn"
          class="secondary"
          style="display:none;"
        >
          RESUME MISSION
        </button>
      </div>

      <div id="accessStatus" class="status">Awaiting code input.</div>
    </section>

    <section id="gameScreen" class="game-screen" style="display: none;">
      <section class="panel lore-panel">
        <div class="panel-title">MISSION FEED</div>
        <div id="missionTitle" class="mission-title">NO MISSION LOADED</div>
        <div id="missionText" class="mission-text">
          Enter a mission code to begin.
        </div>
      </section>

      <section class="panel hud-panel">
        <div class="panel-title">FIELD HUD</div>
        <div id="gameStatus" class="status">Mission ready.</div>

        <div class="hud-stack">
          <div id="scanTargetRow" class="scan-target-row">
            <label for="scanTargetSelect">SCANNING FOR...</label>
            <select id="scanTargetSelect">
              <option value="objective">OBJECTIVE</option>
              <option value="safeSpot">SAFE ZONE</option>
            </select>
          </div>

          <div id="searchPointRow" class="scan-target-row hidden">
            <label for="searchPointSelect">SEARCH POINT</label>
            <select id="searchPointSelect"></select>
          </div>

          <div class="hud-row">
            <div class="hud-box">
              <div class="hud-label">DISTANCE</div>
              <div id="distanceValue" class="hud-value">-- m</div>
            </div>
            <button id="scanDistanceBtn" class="hud-action">SCAN</button>
          </div>

          <div class="hud-row">
            <div class="hud-box">
              <div class="hud-label">BEARINGS</div>
              <div id="signalValue" class="hud-value">---</div>
            </div>
            <button id="scanSignalBtn" class="hud-action">SCAN BEARINGS</button>
          </div>

          <div id="complicationRow" class="hud-row hud-row-single hidden">
            <div class="hud-box">
              <div class="hud-label">COMPLICATION</div>
              <div id="complicationValue" class="hud-value complication-value">-----</div>
            </div>
          </div>

          <button id="checkLocationBtn" class="hud-action hud-action-full">
            CHECK LOCATION
          </button>

          <div id="promptPanel" class="answer-panel hidden">
            <label class="answer-label" for="promptInput">ENTER RESPONSE</label>
            <input
              id="promptInput"
              class="answer-input"
              type="text"
              autocomplete="off"
              spellcheck="false"
              placeholder="RESPONSE CODE"
            />
            <button id="submitPromptBtn" class="hud-action hud-action-full">
              SUBMIT
            </button>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
